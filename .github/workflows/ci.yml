name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖（锁定版本）
        run: pnpm install --frozen-lockfile

      - name: 类型检查
        run: pnpm typecheck

      - name: 单元测试
        run: pnpm test

      - name: 构建双产物 + node:vm 冒烟断言
        run: pnpm build

      # 内核校验必须先于产物提交：raw 链接即发布渠道，只有内核能抓到的
      # 错误（如 not found rule-set）不能在校验前就推上 main
      - name: 真实内核 -t 校验
        run: |
          TAG=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
          curl -fsSL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${TAG}/mihomo-linux-amd64-${TAG}.gz"
          gunzip mihomo.gz && chmod +x mihomo
          MIHOMO_BIN=./mihomo pnpm verify:kernel

      # main 分支：全部校验通过后自动提交产物；PR：仅检查一致性
      - name: 提交构建产物
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mihomo-proxy.js simple-mihomo.js
          git diff --cached --quiet || git commit -m "chore: 同步构建产物 [skip ci]"
          git push

      - name: 产物与源码一致性（PR 检查）
        if: github.event_name == 'pull_request'
        run: git diff --exit-code mihomo-proxy.js simple-mihomo.js
